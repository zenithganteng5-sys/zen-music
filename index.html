<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Official Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Animasi Background */
        .bg-glow {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #00f2ff 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.15;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(-50px, -50px); }
            100% { transform: scale(1.5) translate(50px, 50px); }
        }

        /* Card Utama dengan RGB Border */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: 25px;
            text-align: center;
            width: 400px;
            border: 2px solid transparent;
            /* Efek Garis Berwarna di Pinggir */
            border-image: linear-gradient(45deg, #00f2ff, #ff00ff) 1;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: #00f2ff;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .card h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .description {
            font-size: 0.85rem;
            color: #ccc;
            margin-bottom: 45px;
            line-height: 1.8;
            font-weight: 300;
        }

        /* Tombol YouTube Pro */
        .yt-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            background: #ff0000;
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }

        .yt-button:hover {
            transform: scale(1.1) translateY(-5px);
            background: #fff;
            color: #ff0000;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.55rem;
            letter-spacing: 4px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="card">
        <h2>CREATOR & DEVELOPER</h2>
        <h1>ZENITH</h1>
        
        <p class="description">
            Founder of NexusID • Minecraft Enthusiast • Roblox Studio Developer • Grinding CDID.
        </p>

        <a href="https://www.youtube.com/@zenithmc10" target="_blank" class="yt-button">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
            SUBSCRIBE NOW
        </a>

        <div class="footer">ESTABLISHED MMXXVI</div>
    </div>

</body>
</html>
