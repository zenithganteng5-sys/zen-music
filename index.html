<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Muzik | Infinite Loop Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-image: url('https://img.freepik.com/premium-photo/dark-mountains-images-background-copy-space_1179130-779397.jpg?semt=ais_hybrid&w=740&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            color: white; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1;
        }

        /* FIX: Player ditaruh di belakang background biar tetep 'aktif' tapi gak kelihatan */
        #player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Di bawah overlay hitam */
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        .title-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #00f2ff, #bc13fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .status-info { 
            font-family: 'Orbitron'; 
            font-size: 0.7rem; 
            color: #00f2ff; 
            opacity: 0.8; 
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .bottom-ui {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .btn-container-equal {
            width: 320px; height: 55px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; overflow: hidden;
            transition: 0.3s ease;
        }

        .btn-container-equal:hover {
            border-color: #00f2ff;
            transform: translateY(-3px);
        }

        .btn-label {
            flex: 1; font-family: 'Orbitron'; font-size: 0.7rem; color: #fff;
            text-align: center; letter-spacing: 2px; text-decoration: none;
        }

        .action-btn {
            height: 100%; padding: 0 25px;
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold;
            border: none; cursor: pointer;
        }

        .btn-cyan { background: #00f2ff; color: #000; }
        .btn-red { background: #ff0000; color: #fff; }

        input#videoID {
            flex: 1; background: transparent; border: none; color: white;
            padding: 0 20px; outline: none; font-size: 0.8rem;
        }

        @media (max-width: 1000px) {
            .bottom-ui { flex-direction: column; align-items: center; }
            .btn-container-equal { width: 90%; }
        }
    </style>
</head>
<body>

    <div id="player"></div>

    <div class="main-content">
        <div class="title-area">
            <h1>ZENITH MUZIK</h1>
            <div class="status-info" id="trackName">STANDBY: READY TO VIBE</div>
        </div>

        <div class="bottom-ui">
            <div class="btn-container-equal">
                <div class="btn-label">LOCAL MUZIK</div>
                <input type="file" id="fileInput" accept="audio/*,video/mp4" style="display:none;" multiple onchange="handleFiles(this.files)">
                <button class="action-btn btn-cyan" onclick="document.getElementById('fileInput').click()">UPLOAD</button>
            </div>

            <div class="btn-container-equal">
                <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="btn-label">YOUTUBE ZENITH</a>
            </div>

            <div class="btn-container-equal">
                <input type="text" id="videoID" placeholder="Paste YouTube Link...">
                <button class="action-btn btn-red" onclick="changeYT()">YT PLAY</button>
            </div>
        </div>
    </div>

    <audio id="localAudio"></audio>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let ytPlayer;
        let playlist = [];
        let currentTrackIndex = 0;
        const audio = document.getElementById('localAudio');
        const trackName = document.getElementById('trackName');

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                videoId: 'jfKfPfyJRdk', // Default video biar API ke-load
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 0, 
                    'mute': 1, // Start mute biar gak diblok browser
                    'loop': 1,
                    'playlist': 'jfKfPfyJRdk'
                }
            });
        }

        function handleFiles(files) {
            playlist = Array.from(files);
            if (playlist.length > 0) {
                currentTrackIndex = 0;
                playTrack(currentTrackIndex);
            }
        }

        function playTrack(index) {
            if (index < playlist.length) {
                if(ytPlayer) ytPlayer.pauseVideo();
                const file = playlist[index];
                const url = URL.createObjectURL(file);
                audio.src = url;
                audio.play();
                audio.onended = nextTrack;
                trackName.innerHTML = `PLAYING: ${file.name.toUpperCase()}`;
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            playTrack(currentTrackIndex);
        }

        function changeYT() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) id = input.split('v=')[1].split('&')[0];
            else if (input.includes("youtu.be/")) id = input.split('youtu.be/')[1].split('?')[0];
            else id = input;

            if(id && ytPlayer) {
                audio.pause();
                // Kuncinya di sini: load video baru dan langsung unMute
                ytPlayer.loadVideoById(id);
                ytPlayer.unMute(); 
                ytPlayer.setVolume(100);
                ytPlayer.playVideo();
                trackName.innerHTML = "MODE: YOUTUBE AUDIO STREAMING";
            }
        }
    </script>
</body>
</html>
