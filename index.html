<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Muzik | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; color: white; }
        
        /* Video Background Full */
        iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            transform: translate(-50%, -50%);
            pointer-events: none; border: none;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        /* Container Control Bawah */
        .bottom-ui {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        /* Panel Branding Kiri Bawah (Elegan) */
        .brand-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        .brand-label {
            padding: 10px 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #00f2ff;
            letter-spacing: 2px;
            border-right: 1px solid rgba(0, 242, 255, 0.2);
        }

        .yt-btn-new {
            padding: 10px 20px;
            text-decoration: none;
            color: #fff;
            background: #ff0000;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .yt-btn-new:hover { background: #fff; color: #ff0000; }

        /* Panel Input Kanan Bawah */
        .input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        input#videoID {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 15px;
            width: 250px;
            outline: none;
            font-size: 0.8rem;
        }

        .play-btn {
            background: #00f2ff;
            border: none;
            padding: 10px 20px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        .play-btn:hover { background: #fff; box-shadow: 0 0 15px #00f2ff; }

        .hint {
            position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            font-size: 0.5rem; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <iframe id="videoPlayer" 
        src="https://www.youtube.com/embed/yeBdCjMwsU8?autoplay=1&mute=0&controls=0&loop=1&start=2349&playlist=yeBdCjMwsU8" 
        allow="autoplay">
    </iframe>

    <div class="bottom-ui">
        <div class="brand-bar">
            <div class="brand-label">CREATED BY ZENITH</div>
            <a href="https://www.youtube.com/@zenithmc10" target="_blank" class="yt-btn-new">VISIT YOUTUBE</a>
        </div>

        <div class="input-group">
            <input type="text" id="videoID" placeholder="Paste YouTube Link...">
            <button class="play-btn" onclick="changeTrack()">PLAY</button>
        </div>
    </div>

    <div class="hint">Cinematic Audio Mode Active</div>

    <script>
        function changeTrack() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) { id = input.split('v=')[1].split('&')[0]; }
            else if (input.includes("youtu.be/")) { id = input.split('youtu.be/')[1].split('?')[0]; }
            else { id = input; }

            if(id) {
                // Saat ganti lagu, start tetap dari nol (default)
                const newSrc = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&loop=1&playlist=${id}`;
                document.getElementById('videoPlayer').src = newSrc;
            }
        }
    </script>
</body>
</html>
