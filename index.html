<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Cinematic | Lyrics Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; }
        
        /* Video Background */
        iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            transform: translate(-50%, -50%);
            pointer-events: none; border: none;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        /* Panel Lirik di Paling Kiri */
        .lyrics-panel {
            position: absolute;
            left: 0; top: 0;
            width: 350px; height: 100%;
            z-index: 10;
            padding: 60px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: 0.5s;
        }

        .lyrics-header {
            color: #00f2ff;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Area Teks Lirik yang bisa di-scroll */
        textarea#lyricsInput {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            line-height: 1.8;
            height: 100%;
            width: 100%;
            resize: none;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        textarea#lyricsInput::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        /* UI Control di Bawah */
        .ui-bottom {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        input#videoID {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            outline: none;
            width: 250px;
        }

        button {
            background: #00f2ff;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* Watermark Zenith */
        .watermark {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.6rem;
            letter-spacing: 5px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="watermark">ZENITH CINEMATIC PRO</div>

    <div class="lyrics-panel">
        <div class="lyrics-header">Now Playing Lyrics</div>
        <textarea id="lyricsInput" placeholder="Tempel lirik lagu di sini... lalu scroll manual sesuai lagunya."></textarea>
    </div>

    <iframe id="videoPlayer" 
        src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&controls=0&loop=1&playlist=jfKfPfyJRdk" 
        allow="autoplay">
    </iframe>

    <div class="ui-bottom">
        <input type="text" id="videoID" placeholder="Paste YouTube Link...">
        <button onclick="changeTrack()">Update</button>
    </div>

    <script>
        function changeTrack() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) {
                id = input.split('v=')[1].split('&')[0];
            } else if (input.includes("youtu.be/")) {
                id = input.split('youtu.be/')[1].split('?')[0];
            } else { id = input; }

            if(id) {
                const newSrc = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&loop=1&playlist=${id}`;
                document.getElementById('videoPlayer').src = newSrc;
                // Bersihkan teks lirik buat lagu baru
                document.getElementById('lyricsInput').value = "";
                document.getElementById('lyricsInput').placeholder = "Masukkan lirik baru...";
            }
        }
    </script>
</body>
</html>
