<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Cinematic | Smart Lyrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; }
        
        iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            transform: translate(-50%, -50%);
            pointer-events: none; border: none;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        .lyrics-panel {
            position: absolute;
            left: 0; top: 0;
            width: 380px; height: 100%;
            z-index: 10;
            padding: 60px 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 242, 255, 0.2);
        }

        .lyrics-header {
            color: #00f2ff;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        textarea#lyricsInput {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            line-height: 1.8;
            height: 85%;
            width: 100%;
            resize: none;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        .ui-bottom {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .input-group { display: flex; gap: 5px; }

        input#videoID {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: white;
            padding: 10px;
            border-radius: 5px;
            width: 280px;
            outline: none;
        }

        button {
            background: #00f2ff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        button.btn-search {
            background: rgba(255, 255, 255, 0.1);
            color: #00f2ff;
            border: 1px solid #00f2ff;
        }

        button:hover { opacity: 0.8; transform: scale(1.05); }

        .watermark {
            position: absolute; top: 20px; right: 20px;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.6rem; letter-spacing: 5px; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="watermark">ZENITH SMART PLAYER</div>

    <div class="lyrics-panel">
        <div class="lyrics-header">
            <span>LYRICS PANEL</span>
            <span id="hint" style="color: #fff; opacity: 0.3; font-size: 0.5rem;">SCROLL MANUALLY</span>
        </div>
        <textarea id="lyricsInput" placeholder="1. Paste Link YouTube&#10;2. Klik 'CARI LIRIK'&#10;3. Paste lirik di sini..."></textarea>
    </div>

    <iframe id="videoPlayer" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&controls=0&loop=1&playlist=jfKfPfyJRdk" allow="autoplay"></iframe>

    <div class="ui-bottom">
        <div class="input-group">
            <input type="text" id="videoID" placeholder="Paste YouTube Link...">
            <button onclick="changeTrack()">PLAY</button>
        </div>
        <button class="btn-search" onclick="searchLyrics()">🔍 CARI LIRIK DI GOOGLE</button>
    </div>

    <script>
        function changeTrack() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) { id = input.split('v=')[1].split('&')[0]; }
            else if (input.includes("youtu.be/")) { id = input.split('youtu.be/')[1].split('?')[0]; }
            else { id = input; }

            if(id) {
                const newSrc = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&loop=1&playlist=${id}`;
                document.getElementById('videoPlayer').src = newSrc;
                document.getElementById('lyricsInput').value = "";
            }
        }

        function searchLyrics() {
            const input = document.getElementById('videoID').value;
            if (input) {
                // Link Google Search otomatis buat lirik lagu tersebut
                const query = encodeURIComponent(input + " lyrics");
                window.open(`https://www.google.com/search?q=${query}`, '_blank');
            } else {
                alert("Paste link YouTube-nya dulu, Zen!");
            }
        }
    </script>
</body>
</html>
