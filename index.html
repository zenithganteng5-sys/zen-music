<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Muzik | Ultimate Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; color: white; }
        
        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        iframe, #localVideo { width: 100vw; height: 56.25vw; border: none; }
        #localVideo { display: none; width: 100%; height: 100%; object-fit: cover; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1; pointer-events: none;
        }

        /* CONTAINER UTAMA DI BAWAH */
        .bottom-ui {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: flex-end;
            gap: 15px; z-index: 10; padding: 0 20px;
        }

        /* UKURAN BOX SAMA SEMUA */
        .btn-box {
            width: 320px; height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            display: flex; align-items: center; overflow: hidden;
            transition: 0.3s;
        }

        .btn-box:hover { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        /* LABEL & INPUT */
        .label-text {
            flex: 1; font-family: 'Orbitron', sans-serif; font-size: 0.65rem;
            color: #00f2ff; text-align: center; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; height: 100%;
        }

        .action-btn {
            height: 100%; padding: 0 15px; font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem; font-weight: bold; border: none; cursor: pointer;
        }

        .btn-cyan { background: #00f2ff; color: #000; width: 110px; }
        .btn-red { background: #ff0000; color: #fff; width: 90px; }

        /* KONTROL MEDIA DI TENGAH */
        .media-ctrl-group { display: flex; width: 100%; height: 100%; }
        .ctrl-sub-btn {
            flex: 1; background: transparent; border: none; color: #00f2ff;
            font-family: 'Orbitron', sans-serif; font-size: 0.55rem; cursor: pointer;
            transition: 0.2s; border-right: 1px solid rgba(0, 242, 255, 0.2);
        }
        .ctrl-sub-btn:last-child { border-right: none; }
        .ctrl-sub-btn:hover { background: rgba(0, 242, 255, 0.2); color: white; }

        input#videoID {
            flex: 1; background: transparent; border: none; color: white;
            padding: 0 10px; outline: none; font-size: 0.7rem; height: 100%;
        }

        .status-info { 
            position: absolute; bottom: 105px; left: 50%; 
            transform: translateX(-50%); font-family: 'Orbitron'; 
            font-size: 0.6rem; color: #00f2ff; opacity: 0.8; 
            text-align: center; width: 100%; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="video-container">
        <div id="player"></div>
        <video id="localVideo"></video>
    </div>

    <audio id="localAudio"></audio>

    <div class="status-info" id="trackName">READY TO VIBE</div>

    <div class="bottom-ui">
        <div class="btn-box">
            <div class="label-text">LOCAL FILE</div>
            <input type="file" id="fileInput" accept="audio/*,video/mp4" style="display:none;" multiple onchange="handleFiles(this.files)">
            <button class="action-btn btn-cyan" onclick="document.getElementById('fileInput').click()">UPLOAD</button>
        </div>

        <div class="btn-box" style="width: 400px;"> <div class="media-ctrl-group">
                <button class="ctrl-sub-btn" onclick="prevTrack()">PREV</button>
                <button class="ctrl-btn ctrl-sub-btn" id="playPauseBtn" onclick="togglePlay()">PLAY/PAUSE</button>
                <button class="ctrl-sub-btn" onclick="nextTrack()">NEXT</button>
                <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="label-text" style="border-left: 1px solid rgba(0,242,255,0.3)">YT ZENITH</a>
            </div>
        </div>

        <div class="btn-box">
            <input type="text" id="videoID" placeholder="YouTube Link...">
            <button class="action-btn btn-red" onclick="changeYT()">YT PLAY</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let ytPlayer;
        let isYTMode = true;
        let playlist = [];
        let currentTrackIndex = 0;

        const audio = document.getElementById('localAudio');
        const video = document.getElementById('localVideo');
        const trackName = document.getElementById('trackName');
        const playPauseBtn = document.getElementById('playPauseBtn');

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%', width: '100%',
                videoId: 'jfKfPfyJRdk',
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': 'jfKfPfyJRdk' }
            });
        }

        function handleFiles(files) {
            playlist = Array.from(files);
            if (playlist.length > 0) {
                isYTMode = false;
                currentTrackIndex = 0;
                playLocal(currentTrackIndex);
            }
        }

        function playLocal(index) {
            const file = playlist[index];
            const url = URL.createObjectURL(file);
            ytPlayer.mute();
            ytPlayer.pauseVideo();
            document.getElementById('player').style.display = 'none';

            if (file.type.includes('video')) {
                audio.pause();
                video.style.display = 'block';
                video.src = url;
                video.play();
                video.onended = nextTrack;
            } else {
                video.pause();
                video.style.display = 'none';
                audio.src = url;
                audio.play();
                audio.onended = nextTrack;
            }
            trackName.innerHTML = `PLAYING: ${file.name.toUpperCase()}`;
            playPauseBtn.innerHTML = "PAUSE";
        }

        function togglePlay() {
            if (isYTMode) {
                const state = ytPlayer.getPlayerState();
                if (state == 1) { ytPlayer.pauseVideo(); playPauseBtn.innerHTML = "PLAY"; }
                else { ytPlayer.playVideo(); playPauseBtn.innerHTML = "PAUSE"; }
            } else {
                const target = video.style.display === 'block' ? video : audio;
                if (!target.paused) { target.pause(); playPauseBtn.innerHTML = "PLAY"; }
                else { target.play(); playPauseBtn.innerHTML = "PAUSE"; }
            }
        }

        function nextTrack() {
            if (!isYTMode && playlist.length > 0) {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                playLocal(currentTrackIndex);
            } else if (isYTMode) {
                ytPlayer.seekTo(0);
            }
        }

        function prevTrack() {
            if (!isYTMode && playlist.length > 0) {
                currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
                playLocal(currentTrackIndex);
            } else if (isYTMode) {
                ytPlayer.seekTo(0);
            }
        }

        function changeYT() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) id = input.split('v=')[1].split('&')[0];
            else if (input.includes("youtu.be/")) id = input.split('youtu.be/')[1].split('?')[0];
            else id = input;

            if (id) {
                isYTMode = true;
                audio.pause(); video.pause();
                video.style.display = 'none';
                document.getElementById('player').style.display = 'block';
                ytPlayer.loadVideoById(id);
                ytPlayer.unMute();
                trackName.innerHTML = "YT MODE ACTIVE";
                playPauseBtn.innerHTML = "PAUSE";
            }
        }
    </script>
</body>
</html>
