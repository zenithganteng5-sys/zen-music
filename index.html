<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Muzik | Universal Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; color: white; }
        
        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        iframe, video #localVideo {
            width: 100vw; height: 56.25vw;
            border: none;
        }

        #localVideo { display: none; width: 100%; height: 100%; object-fit: cover; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1; pointer-events: none;
        }

        .media-controls {
            position: absolute; bottom: 110px; left: 50%;
            transform: translateX(-50%); display: flex;
            align-items: center; gap: 15px; z-index: 15;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #00f2ff; font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; transition: 0.3s; min-width: 80px;
        }

        .ctrl-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }

        .bottom-ui {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: flex-end;
            gap: 20px; z-index: 10; padding: 0 30px;
        }

        .btn-container-equal {
            width: 320px; height: 55px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            display: flex; align-items: center; overflow: hidden;
        }

        .btn-label {
            flex: 1; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; color: #00f2ff; text-align: center;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }

        .action-btn {
            height: 100%; padding: 0 20px; font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem; font-weight: bold; border: none; cursor: pointer;
        }

        .btn-cyan { background: #00f2ff; color: #000; width: 140px; }
        .btn-red { background: #ff0000; color: #fff; width: 100px; }

        input#videoID {
            flex: 1; background: transparent; border: none; color: white;
            padding: 0 15px; outline: none; font-size: 0.75rem;
        }

        .status-info { 
            position: absolute; bottom: 165px; left: 50%; 
            transform: translateX(-50%); font-family: 'Orbitron'; 
            font-size: 0.6rem; color: #00f2ff; opacity: 0.8; 
            text-align: center; width: 100%; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="video-container">
        <div id="player"></div>
        <video id="localVideo"></video>
    </div>

    <audio id="localAudio"></audio>

    <div class="status-info" id="trackName">READY TO VIBE</div>

    <div class="media-controls">
        <button class="ctrl-btn" onclick="prevTrack()">PREV</button>
        <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">PLAY/PAUSE</button>
        <button class="ctrl-btn" onclick="nextTrack()">NEXT</button>
    </div>

    <div class="bottom-ui">
        <div class="btn-container-equal">
            <div class="btn-label">LOCAL MUZIK/VID</div>
            <input type="file" id="fileInput" accept="audio/*,video/mp4" style="display:none;" multiple onchange="handleFiles(this.files)">
            <button class="action-btn btn-cyan" onclick="document.getElementById('fileInput').click()">UPLOAD</button>
        </div>

        <div class="btn-container-equal">
            <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="btn-label">YOUTUBE ZENITH</a>
        </div>

        <div class="btn-container-equal">
            <input type="text" id="videoID" placeholder="YouTube Link...">
            <button class="action-btn btn-red" onclick="changeYT()">YT PLAY</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let ytPlayer;
        let isYTMode = true;
        let playlist = [];
        let currentTrackIndex = 0;

        const audio = document.getElementById('localAudio');
        const video = document.getElementById('localVideo');
        const trackName = document.getElementById('trackName');

        // Initialize YouTube Player
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'jfKfPfyJRdk', // Default background
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': 'jfKfPfyJRdk' },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED && isYTMode) {
                ytPlayer.playVideo(); // Loop YouTube
            }
        }

        function handleFiles(files) {
            playlist = Array.from(files);
            if (playlist.length > 0) {
                isYTMode = false;
                currentTrackIndex = 0;
                playLocal(currentTrackIndex);
            }
        }

        function playLocal(index) {
            const file = playlist[index];
            const url = URL.createObjectURL(file);
            
            // Matikan YouTube
            ytPlayer.mute();
            ytPlayer.pauseVideo();
            document.getElementById('player').style.display = 'none';

            if (file.type.includes('video')) {
                audio.pause();
                video.style.display = 'block';
                video.src = url;
                video.play();
                video.onended = nextTrack;
            } else {
                video.pause();
                video.style.display = 'none';
                audio.src = url;
                audio.play();
                audio.onended = nextTrack;
            }
            trackName.innerHTML = `LOCAL: ${file.name.toUpperCase()}`;
        }

        function togglePlay() {
            if (isYTMode) {
                const state = ytPlayer.getPlayerState();
                if (state == 1) ytPlayer.pauseVideo();
                else ytPlayer.playVideo();
            } else {
                if (!audio.paused) audio.pause();
                else if (audio.src) audio.play();
                
                if (!video.paused) video.pause();
                else if (video.src) video.play();
            }
        }

        function nextTrack() {
            if (isYTMode) {
                // YouTube mode doesn't have a playlist unless defined, but we can restart
                ytPlayer.seekTo(0);
            } else if (playlist.length > 0) {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                playLocal(currentTrackIndex);
            }
        }

        function prevTrack() {
            if (isYTMode) {
                ytPlayer.seekTo(0);
            } else if (playlist.length > 0) {
                currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
                playLocal(currentTrackIndex);
            }
        }

        function changeYT() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) id = input.split('v=')[1].split('&')[0];
            else if (input.includes("youtu.be/")) id = input.split('youtu.be/')[1].split('?')[0];
            else id = input;

            if (id) {
                isYTMode = true;
                audio.pause();
                video.pause();
                video.style.display = 'none';
                document.getElementById('player').style.display = 'block';
                ytPlayer.loadVideoById(id);
                ytPlayer.unMute();
                trackName.innerHTML = "YT MODE ACTIVE";
            }
        }
    </script>
</body>
</html>
